name: War Room Pro 9-5 Automation

on:
  schedule:
    - cron: '0 1-9 * * 1-5' # Jalan setiap jam, Pukul 9 pagi - 5 petang (Waktu Malaysia), Isnin-Jumaat
  workflow_dispatch:

jobs:
  war-room-operation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install git+https://github.com/openai/swarm.git openai requests gspread google-auth

      - name: Run War Room Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python war_room_v3.py
